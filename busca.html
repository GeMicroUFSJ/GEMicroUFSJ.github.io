<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 50px;
  padding: 50px 40px 30px;
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}

.left {
  width: 32%;
  max-width: 360px;
  text-align: center;
  position: sticky;
  top: 40px;
}

.left img {
  width: 100%;
  max-width: 300px;
  height: auto;
  display: block;
  margin: 0 auto;
}

.title {
  margin-top: 22px;
  font-size: 30px;
  font-weight: 600;
  line-height: 1.2;
}

.center {
  flex: 1;
  max-width: 640px;
}

.content-box {
  background-color: rgba(255, 255, 255, 0.35);
  border: 1px solid var(--borda-suave);
  border-radius: 18px;
  padding: 32px 28px;
}

h1 {
  margin-top: 0;
  margin-bottom: 28px;
  font-size: 34px;
  font-weight: 600;
  text-align: center;
}

.section {
  margin-bottom: 34px;
}

.section:last-child {
  margin-bottom: 0;
}

.section-title {
  font-size: 25px;
  font-weight: 600;
  margin-bottom: 14px;
  text-align: center;
}

.section-description {
  font-size: 17px;
  text-align: center;
  margin-bottom: 18px;
  line-height: 1.5;
}

.input-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

input {
  padding: 13px 14px;
  width: 100%;
  max-width: 360px;
  font-size: 16px;
  font-family: Arial, sans-serif;
  border: 1px solid #cfc7b6;
  border-radius: 10px;
  outline: none;
  background-color: #ffffff;
}

input:focus {
  border-color: var(--cor-botao);
}

button {
  padding: 13px 18px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background-color: var(--cor-botao);
  color: #ffffff;
  font-family: var(--fonte-principal);
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
}

button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-2px);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.resultado {
  margin-top: 22px;
  font-size: 18px;
  line-height: 1.7;
  text-align: center;
}

.resultado a {
  color: var(--cor-botao);
  text-decoration: none;
  font-weight: 600;
}

.resultado a:hover {
  text-decoration: underline;
}

.divisor {
  border: none;
  border-top: 1px solid #d7d0bf;
  margin: 28px 0;
}

.right {
  width: 24%;
  max-width: 280px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: sticky;
  top: 40px;
}

.menu a {
  text-decoration: none;
}

.menu button {
  width: 100%;
  padding: 15px 16px;
  font-size: 17px;
}

.menu .current button {
  background-color: var(--cor-botao-hover);
}

.footer {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 28px;
  padding: 22px 20px 26px;
}

.footer img {
  height: 55px;
  width: auto;
}

@media (max-width: 1100px) {
  .container {
    flex-direction: column;
    align-items: center;
    gap: 34px;
  }

  .left,
  .center,
  .right {
    width: 100%;
    max-width: 760px;
  }

  .left,
  .right {
    position: static;
  }

  .menu {
    position: static;
    max-width: 420px;
    margin: 0 auto;
  }

  .left img {
    max-width: 240px;
  }

  .title {
    font-size: 27px;
  }
}

@media (max-width: 680px) {
  .container {
    padding: 30px 18px 20px;
  }

  .content-box {
    padding: 24px 18px;
  }

  h1 {
    font-size: 28px;
  }

  .section-title {
    font-size: 22px;
  }

  .section-description {
    font-size: 16px;
  }

  .resultado {
    font-size: 17px;
  }

  .footer {
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer img {
    height: 48px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div class="container">

    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <div class="center">
      <div class="content-box">
        <h1>Certificados</h1>

        <div class="section">
          <div class="section-title">Buscar certificado pelo nome</div>
          <div class="section-description">
            Digite parte do nome para localizar os certificados disponíveis.
          </div>

          <div class="input-row">
            <input type="text" id="nomeInput" placeholder="Ex.: Cristiane">
            <button id="btnNome" onclick="buscarNome()" disabled>Buscar</button>
          </div>

          <div id="resultadoNome" class="resultado"></div>
        </div>

        <hr class="divisor">

        <div class="section">
          <div class="section-title">Validar certificado por código</div>
          <div class="section-description">
            Digite o código de validação para verificar a autenticidade do certificado.
          </div>

          <div class="input-row">
            <input type="text" id="codigoInput" placeholder="Ex.: GEMICRO-UFSJ-000001">
            <button id="btnCodigo" onclick="validarCodigo()" disabled>Validar</button>
          </div>

          <div id="resultadoCodigo" class="resultado"></div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="menu">
        <a href="index.html"><button>Página inicial</button></a>
        <a href="historia.html"><button>Nossa história</button></a>
        <a href="quem-somos.html"><button>Quem somos</button></a>
        <a href="atividades.html"><button>Atividades</button></a>
        <a href="busca.html" class="current"><button>Buscar e validar certificados</button></a>
        <a href="links.html"><button>Links úteis</button></a>
      </div>
    </div>

  </div>

  <div class="footer">
    <img src="menu-logo_menor.png" alt="UFSJ">
    <img src="deceb_logo.png" alt="DECEB">
  </div>
</div>

<script>
let dados = [];

const URL = "https://opensheet.elk.sh/1MNP35RsZyiFmfuxJtObvU_JEFJWIShf65aMquWNm-pw/pagina1";

// Carrega dados do Google Sheets
async function carregarDados() {
    try {
        const resposta = await fetch(URL);
        dados = await resposta.json();

        console.log("Certificados carregados:", dados.length);

        // Ativa botões após carregar
        document.getElementById("btnNome").disabled = false;
        document.getElementById("btnCodigo").disabled = false;

    } catch (e) {
        console.error("Erro ao carregar dados:", e);
    }
}

carregarDados();

// Validação por código
function validarCodigo() {
    const codigo = document.getElementById("codigoInput").value.trim();
    const div = document.getElementById("resultadoCodigo");

    if (!codigo) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um código.</span>";
        return;
    }

    const item = dados.find(x => x.codigo.toUpperCase() === codigo.toUpperCase());

    if (item) {
        div.innerHTML = "<span style='color:green;'>✔ Certificado válido.</span><br>"
            + "Emitido para: <b>" + item.nome + "</b><br>"
            + "Evento: " + item.evento + "<br>"
            + "Semestre: " + item.semestre + "<br>"
            + "Tipo: " + item.tipo + "<br>"
            + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download do PDF</a>";
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Código inválido.</span>";
    }
}

// Busca por nome
function buscarNome() {
    const nome = document.getElementById("nomeInput").value.trim().toLowerCase();
    const div = document.getElementById("resultadoNome");

    if (!nome) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um nome.</span>";
        return;
    }

    const resultados = dados.filter(x => x.nome.toLowerCase().includes(nome));

    if (resultados.length > 0) {
        let html = "";
        resultados.forEach(item => {
            html += "✔ <b>" + item.nome + "</b> (" + item.codigo + ")<br>"
                  + "Evento: " + item.evento + " | "
                  + "Semestre: " + item.semestre + " | "
                  + "Tipo: " + item.tipo + "<br>"
                  + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download</a><br><br>";
        });
        div.innerHTML = html;
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Nenhum certificado encontrado.</span>";
    }
}

// Enter para busca
document.getElementById("nomeInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") buscarNome();
});

document.getElementById("codigoInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") validarCodigo();
});
</script>

</body>
</html>
