<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 60px;
}

.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
  height: auto;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

.right {
  flex: 1;
  display: flex;
  justify-content: center;
}

.content-box {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.panel {
  background-color: rgba(255, 255, 255, 0.38);
  border: 1px solid var(--borda-suave);
  border-radius: 16px;
  padding: 28px 24px;
}

h1 {
  margin: 0 0 20px 0;
  font-size: 30px;
  font-weight: 600;
  text-align: center;
}

.section {
  margin-bottom: 28px;
}

.section:last-child {
  margin-bottom: 0;
}

.section-title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 12px;
}

.input-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

input {
  width: 100%;
  max-width: 300px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
  font-family: Arial, sans-serif;
}

.resultado {
  margin-top: 20px;
  text-align: center;
  font-size: 17px;
  line-height: 1.6;
}

.resultado a {
  color: var(--cor-botao);
  text-decoration: none;
}

.resultado a:hover {
  text-decoration: underline;
}

.divisor {
  border: none;
  border-top: 1px solid #d7d0bf;
  margin: 30px 0;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border: none;
  border-radius: 12px;
  background-color: var(--cor-botao);
  color: #fff;
  font-family: var(--fonte-principal);
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.acao-botao {
  width: auto;
  min-width: 120px;
  padding: 10px 16px;
  font-size: 16px;
  border-radius: 8px;
}

.voltar {
  width: 100%;
}

/* FOOTER FINAL */
.footer {
  display: flex;
  justify-content: center;
  padding: 10px 20px 15px;
  margin-top: -10px;
}

.contato {
  display: flex;
  gap: 18px;
}

.contato a {
  opacity: 0.7;
  transition: 0.2s;
}

.contato a:hover {
  opacity: 1;
  transform: scale(1.15);
}

.contato svg {
  width: 40px;
  height: 40px;
  fill: #3a2426;
}

.contato svg:hover {
  fill: #529552;
}

@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
    gap: 40px;
  }

  .left, .right {
    max-width: 100%;
  }

  .content-box {
    max-width: 100%;
  }

  .title {
    font-size: 26px;
  }

  .input-row {
    flex-direction: column;
    align-items: center;
  }

  input {
    max-width: 100%;
  }

  .acao-botao {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div id="header-container"></div>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <!-- DIREITA -->
    <div class="right">
      <div class="content-box">

        <div class="panel">
          <h1>Certificados</h1>

          <div class="section">
            <div class="section-title">Buscar por nome</div>

            <div class="input-row">
              <input type="text" id="nomeInput" placeholder="Ex.: Cristiane">
              <button class="acao-botao" id="btnNome" onclick="buscarNome()" disabled>Buscar</button>
            </div>

            <div id="resultadoNome" class="resultado"></div>
          </div>

          <hr class="divisor">

          <div class="section">
            <div class="section-title">Validar por código</div>

            <div class="input-row">
              <input type="text" id="codigoInput" placeholder="Ex.: GEMICRO-UFSJ-000001">
              <button class="acao-botao" id="btnCodigo" onclick="validarCodigo()" disabled>Validar</button>
            </div>

            <div id="resultadoCodigo" class="resultado"></div>
          </div>
        </div>

        <a href="index.html">
          <button class="voltar">Voltar para a página inicial</button>
        </a>

      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="contato">

      <a href="https://www.instagram.com/gemicro_ufsj/" target="_blank" title="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M7.75 2C4.58 2 2 4.58 2 7.75v8.5C2 19.42 4.58 22 7.75 22h8.5C19.42 22 22 19.42 22 16.25v-8.5C22 4.58 19.42 2 16.25 2h-8.5zm0 2h8.5C18.01 4 20 5.99 20 7.75v8.5c0 1.76-1.99 3.75-3.75 3.75h-8.5C5.99 20 4 18.01 4 16.25v-8.5C4 5.99 5.99 4 7.75 4zm8.25 1.5a1 1 0 100 2 1 1 0 000-2zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
        </svg>
      </a>

      <a href="mailto:labmicroambiental.ufsj@gmail.com" title="E-mail">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M2 4h20v16H2V4zm2 2v.01L12 13l8-6.99V6H4zm16 2.24l-7.4 5.8a1 1 0 01-1.2 0L4 8.24V18h16V8.24z"/>
        </svg>
      </a>

    </div>
  </div>

</div>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;
  });
</script>

<script>
let dados = [];

const URL = "https://opensheet.elk.sh/1MNP35RsZyiFmfuxJtObvU_JEFJWIShf65aMquWNm-pw/pagina1";

// Carrega dados do Google Sheets
async function carregarDados() {
    try {
        const resposta = await fetch(URL);
        dados = await resposta.json();

        console.log("Certificados carregados:", dados.length);

        // Ativa botões após carregar
        document.getElementById("btnNome").disabled = false;
        document.getElementById("btnCodigo").disabled = false;

    } catch (e) {
        console.error("Erro ao carregar dados:", e);
    }
}

carregarDados();

// Validação por código
function validarCodigo() {
    const codigo = document.getElementById("codigoInput").value.trim();
    const div = document.getElementById("resultadoCodigo");

    if (!codigo) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um código.</span>";
        return;
    }

    const item = dados.find(x => x.codigo.toUpperCase() === codigo.toUpperCase());

    if (item) {
        div.innerHTML = "<span style='color:green;'>✔ Certificado válido.</span><br>"
            + "Emitido para: <b>" + item.nome + "</b><br>"
            + "Evento: " + item.evento + "<br>"
            + "Semestre: " + item.semestre + "<br>"
            + "Tipo: " + item.tipo + "<br>"
            + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download do PDF</a>";
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Código inválido.</span>";
    }
}

// Busca por nome
function buscarNome() {
    const nome = document.getElementById("nomeInput").value.trim().toLowerCase();
    const div = document.getElementById("resultadoNome");

    if (!nome) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um nome.</span>";
        return;
    }

    const resultados = dados.filter(x => x.nome.toLowerCase().includes(nome));

    if (resultados.length > 0) {
        let html = "";
        resultados.forEach(item => {
            html += "✔ <b>" + item.nome + "</b> (" + item.codigo + ")<br>"
                  + "Evento: " + item.evento + " | "
                  + "Semestre: " + item.semestre + " | "
                  + "Tipo: " + item.tipo + "<br>"
                  + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download</a><br><br>";
        });
        div.innerHTML = html;
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Nenhum certificado encontrado.</span>";
    }
}

// Enter para busca
document.getElementById("nomeInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") buscarNome();
});

document.getElementById("codigoInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") validarCodigo();
});
</script>

</body>
</html>
