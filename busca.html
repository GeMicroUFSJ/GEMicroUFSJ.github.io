<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificados – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Mesma base da home */
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 60px;
}

.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
  height: auto;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

.right {
  flex: 1;
  display: flex;
  justify-content: center;
}

.content-box {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.panel {
  background-color: rgba(255, 255, 255, 0.38);
  border: 1px solid var(--borda-suave);
  border-radius: 16px;
  padding: 28px 24px;
}

h1 {
  margin: 0 0 24px 0;
  font-size: 30px;
  font-weight: 600;
  text-align: center;
}

.section {
  margin-bottom: 28px;
}

.section:last-of-type {
  margin-bottom: 0;
}

.section-title {
  text-align: center;
  font-size: 21px;
  font-weight: 600;
  margin-bottom: 12px;
}

.input-row {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid #cfc7b6;
  font-size: 16px;
  font-family: Arial, sans-serif;
  background-color: #ffffff;
  outline: none;
}

input:focus {
  border-color: var(--cor-botao);
}

button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border: none;
  border-radius: 12px;
  background-color: var(--cor-botao);
  color: #fff;
  font-family: var(--fonte-principal);
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
}

.resultado {
  margin-top: 18px;
  text-align: center;
  font-size: 17px;
  line-height: 1.6;
}

.resultado a {
  color: var(--cor-botao);
  text-decoration: none;
}

.resultado a:hover {
  text-decoration: underline;
}

.divisor {
  border: none;
  border-top: 1px solid #d7d0bf;
  margin: 26px 0;
}

.footer {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 25px 0;
}

.footer img {
  height: 55px;
}

@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
    gap: 40px;
  }

  .left, .right {
    max-width: 100%;
  }

  .content-box {
    max-width: 100%;
  }

  .title {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="container">

    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <div class="right">
      <div class="content-box">

        <div class="panel">
          <h1>Certificados</h1>

          <div class="section">
            <div class="section-title">Buscar por nome</div>

            <div class="input-row">
              <input type="text" id="nomeInput" placeholder="Ex.: Cristiane">
              <button id="btnNome" onclick="buscarNome()" disabled>Buscar</button>
            </div>

            <div id="resultadoNome" class="resultado"></div>
          </div>

          <hr class="divisor">

          <div class="section">
            <div class="section-title">Validar por código</div>

            <div class="input-row">
              <input type="text" id="codigoInput" placeholder="Ex.: GEMICRO-UFSJ-000001">
              <button id="btnCodigo" onclick="validarCodigo()" disabled>Validar</button>
            </div>

            <div id="resultadoCodigo" class="resultado"></div>
          </div>
        </div>

        <a href="index.html">
          <button>Voltar para a página inicial</button>
        </a>

      </div>
    </div>

  </div>

  <div class="footer">
    <img src="menu-logo_menor.png" alt="UFSJ">
    <img src="deceb_logo.png" alt="DECEB">
  </div>

</div>

<script>
let dados = [];

const URL = "https://opensheet.elk.sh/1MNP35RsZyiFmfuxJtObvU_JEFJWIShf65aMquWNm-pw/pagina1";

async function carregarDados() {
    try {
        const resposta = await fetch(URL);
        dados = await resposta.json();

        document.getElementById("btnNome").disabled = false;
        document.getElementById("btnCodigo").disabled = false;

    } catch (e) {
        console.error("Erro ao carregar dados:", e);
    }
}

carregarDados();

function validarCodigo() {
    const codigo = document.getElementById("codigoInput").value.trim();
    const div = document.getElementById("resultadoCodigo");

    if (!codigo) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um código.</span>";
        return;
    }

    const item = dados.find(x => x.codigo.toUpperCase() === codigo.toUpperCase());

    if (item) {
        div.innerHTML = "<span style='color:green;'>✔ Certificado válido.</span><br>"
            + "Emitido para: <b>" + item.nome + "</b><br>"
            + "Evento: " + item.evento + "<br>"
            + "Semestre: " + item.semestre + "<br>"
            + "Tipo: " + item.tipo + "<br>"
            + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download do PDF</a>";
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Código inválido.</span>";
    }
}

function buscarNome() {
    const nome = document.getElementById("nomeInput").value.trim().toLowerCase();
    const div = document.getElementById("resultadoNome");

    if (!nome) {
        div.innerHTML = "<span style='color:#b00;'>❗ Digite um nome.</span>";
        return;
    }

    const resultados = dados.filter(x => x.nome.toLowerCase().includes(nome));

    if (resultados.length > 0) {
        let html = "";
        resultados.forEach(item => {
            html += "✔ <b>" + item.nome + "</b> (" + item.codigo + ")<br>"
                  + "Evento: " + item.evento + " | "
                  + "Semestre: " + item.semestre + " | "
                  + "Tipo: " + item.tipo + "<br>"
                  + "<a href='certificados/" + item.codigo + ".pdf' target='_blank'>Download</a><br><br>";
        });
        div.innerHTML = html;
    } else {
        div.innerHTML = "<span style='color:#b00;'>✖ Nenhum certificado encontrado.</span>";
    }
}

document.getElementById("nomeInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") buscarNome();
});

document.getElementById("codigoInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") validarCodigo();
});
</script>

</body>
</html>
