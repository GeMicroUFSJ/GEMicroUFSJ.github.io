<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

/* Layout geral */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Área central */
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 60px;
}

/* ESQUERDA */
.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
  height: auto;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

/* DIREITA */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
}

/* MENU */
.menu {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.menu a {
  text-decoration: none;
}

/* BOTÕES */
.menu button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border: none;
  border-radius: 12px;

  background-color: var(--cor-botao);
  color: #fff;

  font-family: var(--fonte-principal);
  cursor: pointer;

  box-shadow: 0 6px 14px rgba(0,0,0,0.08);

  transition: all 0.2s ease;
}

.menu button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

/* RODAPÉ */
.footer {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 22px;
  padding: 24px 10px 28px;
  flex-wrap: wrap;
}

.footer img {
  height: 52px;
  transition: 0.2s;
}

.footer img:hover {
  transform: scale(1.05);
}

.contato {
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: 0.3px;
}

.contato a {
  color: #3a2426;
  text-decoration: none;
  transition: 0.2s;
}

.contato a:hover {
  text-decoration: underline;
  opacity: 0.8;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
    gap: 40px;
  }

  .left, .right {
    max-width: 100%;
  }

  .menu {
    max-width: 100%;
  }

  .title {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="container">

    <!-- ESQUERDA -->
    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <!-- DIREITA -->
    <div class="right">
      <div class="menu">
        <a href="historia.html"><button>Nossa história</button></a>
        <a href="quem-somos.html"><button>Quem somos</button></a>
        <a href="atividades.html"><button>Atividades</button></a>
        <a href="busca.html"><button>Buscar e validar certificados</button></a>
        <a href="links.html"><button>Links úteis</button></a>
      </div>
    </div>

  </div>

  <!-- RODAPÉ -->
  <div id="footer-container"></div>

</div>

<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-container").innerHTML = data;
  });
</script>

</body>
</html>
