<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GEMICRO / UFSJ</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom right, #ffffff, #f5f5f5);
}

/* Layout principal */
.container {
  display: flex;
  height: 100vh;
}

/* Lado esquerdo */
.left {
  width: 40%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Lado direito */
.right {
  width: 60%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Logo */
.left img {
  max-width: 250px;
}

/* Título */
.title {
  font-size: 28px;
  font-weight: bold;
  margin-top: 20px;
}

/* Menu */
.menu {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 60%;
}

.menu a {
  text-decoration: none;
}

/* Botões */
.menu button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  cursor: pointer;
  border: none;
  background-color: #e0e0e0;
  border-radius: 8px;
  transition: 0.2s;
}

.menu button:hover {
  background-color: #d0d0d0;
}

/* Rodapé */
.footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}

.footer img {
  height: 60px;
  margin: 0 10px;
}

/* Responsivo */
@media (max-width: 800px) {
  .container {
    flex-direction: column;
  }

  .left, .right {
    width: 100%;
    height: auto;
  }

  .menu {
    width: 80%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- ESQUERDA -->
  <div class="left">
    <img src="Logo_oficial.jpg" alt="GEMICRO">
    <div class="title">GEMicro UFSJ</div>
  </div>

  <!-- DIREITA -->
  <div class="right">

    <div class="menu">
      <a href="historia.html"><button>Nossa história</button></a>
      <a href="quem-somos.html"><button>Quem somos</button></a>
      <a href="atividades.html"><button>Atividades</button></a>
      <a href="busca.html"><button>Buscar e validar certificados</button></a>
      <a href="links.html"><button>Links úteis</button></a>
    </div>

  </div>

</div>

<!-- Rodapé -->
<div class="footer">
  <img src="menu-logo_menor.png" alt="UFSJ">
  <img src="deceb_logo.png" alt="DECEB">
</div>

</body>
</html>
