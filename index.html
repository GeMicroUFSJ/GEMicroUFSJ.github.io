<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

/* Layout geral */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Área central */
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 60px;
}

/* ESQUERDA */
.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
  height: auto;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

/* DIREITA */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
}

/* MENU */
.menu {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.menu a {
  text-decoration: none;
}

/* BOTÕES */
.menu button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border: none;
  border-radius: 12px;
  background-color: var(--cor-botao);
  color: #fff;
  font-family: var(--fonte-principal);
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

.menu button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

/* RODAPÉ */
.footer {
  display: flex;
  justify-content: center;
  padding: 10px 20px 15px;
  margin-top: -10px;
}

.contato {
  display: flex;
  gap: 18px;
}

.contato a {
  opacity: 0.7;
  transition: 0.2s;
}

.contato a:hover {
  opacity: 1;
  transform: scale(1.15);
}

.contato svg {
  width: 40px;
  height: 40px;
  fill: #3a2426;
}

.contato svg:hover {
  fill: #529552;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
    gap: 40px;
  }

  .left, .right {
    max-width: 100%;
  }

  .menu {
    max-width: 100%;
  }

  .title {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div id="header-container"></div>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <!-- DIREITA -->
    <div class="right">
      <div class="menu">
        <a href="historia.html"><button>Nossa história</button></a>
        <a href="quem-somos.html"><button>Quem somos</button></a>
        <a href="atividades.html"><button>Atividades</button></a>
        <a href="busca.html"><button>Buscar e validar certificados</button></a>
        <a href="links.html"><button>Materiais</button></a>
      </div>
    </div>

  </div>

  <!-- RODAPÉ -->
  <div class="footer">
    <div class="contato">

      <a href="https://www.instagram.com/gemicro_ufsj/" target="_blank" title="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M7.75 2C4.58 2 2 4.58 2 7.75v8.5C2 19.42 4.58 22 7.75 22h8.5C19.42 22 22 19.42 22 16.25v-8.5C22 4.58 19.42 2 16.25 2h-8.5zm0 2h8.5C18.01 4 20 5.99 20 7.75v8.5c0 1.76-1.99 3.75-3.75 3.75h-8.5C5.99 20 4 18.01 4 16.25v-8.5C4 5.99 5.99 4 7.75 4zm8.25 1.5a1 1 0 100 2 1 1 0 000-2zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"/>
        </svg>
      </a>

      <a href="mailto:labmicroambiental.ufsj@gmail.com" title="E-mail">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M2 4h20v16H2V4zm2 2v.01L12 13l8-6.99V6H4zm16 2.24l-7.4 5.8a1 1 0 01-1.2 0L4 8.24V18h16V8.24z"/>
        </svg>
      </a>

    </div>
  </div>

</div>

<script>
fetch("header.html")

</html>
