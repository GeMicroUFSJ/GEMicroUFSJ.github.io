<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links úteis – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.content {
  max-width: 700px;
  width: 100%;
  text-align: center;
}

h1 {
  margin-bottom: 25px;
}

/* Lista de links */
.links {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.links a {
  display: block;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  background-color: #ffffff;
  color: var(--cor-texto);
  border: 1px solid #d8d2bf;
  transition: 0.2s;
}

.links a:hover {
  background-color: #f3f0e6;
}

button {
  margin-top: 30px;
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background-color: var(--cor-botao);
  color: white;
  cursor: pointer;
}

button:hover {
  background-color: var(--cor-botao-hover);
}
</style>
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- CONTEÚDO -->
  <div class="container">
    <div class="content">

      <h1>Links úteis</h1>

      <div class="links">
        <a href="https://www.embrapa.br/" target="_blank">Embrapa</a>
        <a href="https://www.gov.br/cnpq/" target="_blank">CNPq</a>
        <a href="https://www.periodicos.capes.gov.br/" target="_blank">Portal de Periódicos CAPES</a>
        <a href="https://scholar.google.com.br/" target="_blank">Google Acadêmico</a>
      </div>

      <a href="index.html">
        <button>Voltar para a página inicial</button>
      </a>

    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-container"></div>

</div>

<!-- SCRIPT HEADER + FOOTER -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-container").innerHTML = data;
  });
</script>

</body>
</html>
