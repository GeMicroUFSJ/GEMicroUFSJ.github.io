<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atividades – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  justify-content: center;
  padding: 60px 20px;
}

.content {
  max-width: 700px;
  width: 100%;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
}

p {
  font-size: 17px;
  line-height: 1.6;
}

button {
  margin-top: 30px;
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background-color: var(--cor-botao);
  color: white;
  cursor: pointer;
}

button:hover {
  background-color: var(--cor-botao-hover);
}
</style>
</head>

<body>

<div class="page">

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- CONTEÚDO -->
  <div class="container">
    <div class="content">

      <h1>Atividades</h1>

      <p>Esta página está em construção.</p>
      <p>Em breve, aqui serão apresentadas as atividades desenvolvidas pelo grupo, incluindo cursos, eventos, projetos e ações de extensão.</p>

      <a href="index.html">
        <button>Voltar para a página inicial</button>
      </a>

    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-container"></div>

</div>

<!-- SCRIPT HEADER + FOOTER -->
<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;
  });

fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer-container").innerHTML = data;
  });
</script>

</body>
</html>
