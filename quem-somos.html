<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quem somos – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  gap: 60px;
}

.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
  height: auto;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

.right {
  flex: 1;
  display: flex;
  justify-content: center;
}

.content-box {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.panel {
  background-color: rgba(255, 255, 255, 0.38);
  border: 1px solid var(--borda-suave);
  border-radius: 16px;
  padding: 28px 24px;
}

h1 {
  margin: 0 0 20px 0;
  font-size: 30px;
  font-weight: 600;
  text-align: center;
}

.texto {
  font-size: 17px;
  line-height: 1.7;
  text-align: justify;
}

.texto p {
  margin-top: 0;
  margin-bottom: 16px;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border: none;
  border-radius: 12px;
  background-color: var(--cor-botao);
  color: #fff;
  font-family: var(--fonte-principal);
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

button:hover {
  background-color: var(--cor-botao-hover);
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

.footer {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 25px 0;
}

.footer img {
  height: 55px;
}

@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
    gap: 40px;
  }

  .left, .right {
    max-width: 100%;
  }

  .content-box {
    max-width: 100%;
  }

  .title {
    font-size: 26px;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="container">

    <div class="left">
      <img src="logo_oficial_sem_fundo.png" alt="GEMICRO">
      <div class="title">GEMicro UFSJ</div>
    </div>

    <div class="right">
      <div class="content-box">

        <div class="panel">
          <h1>Quem somos</h1>

          <div class="texto">
            <p>Esta página está em construção.</p>
            <p>Em breve, aqui serão apresentadas informações sobre os integrantes do grupo, suas funções e sua atuação nas atividades desenvolvidas pelo GEMicro.</p>
          </div>
        </div>

        <a href="index.html">
          <button>Voltar para a página inicial</button>
        </a>

      </div>
    </div>

  </div>

  <div class="footer">
    <img src="menu-logo_menor.png" alt="UFSJ">
    <img src="deceb_logo.png" alt="DECEB">
  </div>

</div>

</body>
</html>
