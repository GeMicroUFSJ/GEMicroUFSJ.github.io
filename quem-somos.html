<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quem somos – GEMICRO / UFSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-texto: #3a2426;
  --cor-botao: #529552;
  --cor-botao-hover: #417a41;
  --fundo: #fffdee;
  --fonte-principal: 'Playfair Display', serif;
  --borda-suave: #d8d2bf;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: var(--fonte-principal);
  background-color: var(--fundo);
  color: var(--cor-texto);
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 80px;
  gap: 60px;
}

.left {
  flex: 1;
  max-width: 420px;
  text-align: center;
}

.left img {
  width: 100%;
  max-width: 320px;
}

.title {
  margin-top: 25px;
  font-size: 30px;
  font-weight: 600;
}

.right {
  flex: 2.5;
  display: flex;
  justify-content: center;
}

.content-box {
  width: 100%;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.panel {
  background-color: rgba(255, 255, 255, 0.38);
  border: 1px solid var(--borda-suave);
  border-radius: 16px;
  padding: 28px;
}

h1 {
  text-align: center;
  margin-bottom: 25px;
}

/* COORDENAÇÃO */
.coordenacao {
  text-align: center;
}

.coordenacao img {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

.nome {
  font-weight: 600;
}

.info {
  font-size: 15px;
}

/* GRID ALUNOS */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  margin-top: 20px;
}

.card {
  text-align: center;
}

.card img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
}

.lattes {
  display: inline-block;
  margin-top: 5px;
  font-size: 14px;
  color: var(--cor-botao);
  text-decoration: none;
}

.lattes:hover {
  text-decoration: underline;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background-color: var(--cor-botao);
  color: white;
  font-family: var(--fonte-principal);
  cursor: pointer;
}

button:hover {
  background-color: var(--cor-botao-hover);
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: center;
  padding: 10px 20px 15px;
}

.contato {
  display: flex;
  gap: 18px;
}

.contato svg {
  width: 40px;
  height: 40px;
  fill: #3a2426;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
    padding: 40px 20px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="page">

<div id="header-container"></div>

<div class="container">

<div class="left">
  <img src="logo_oficial_sem_fundo.png">
  <div class="title">GEMicro UFSJ</div>
</div>

<div class="right">
<div class="content-box">

<div class="panel">
<h1>Quem somos</h1>

<!-- COORDENAÇÃO -->
<div class="coordenacao">
  <img src="foto-coordenadora.jpg">

  <div class="nome">Profa. Cristiane Alcantara</div>
  <div class="info">Coordenação</div>
  <div class="info">Bioengenharia / Microbiologia</div>

  <a class="lattes" href="#" target="_blank">Currículo Lattes</a>
</div>

<!-- ALUNOS -->
<div class="grid">

<div class="card">
  <img src="foto1.jpg">
  <div class="nome">Nome do aluno</div>
  <div class="info">Função no grupo</div>
  <div class="info">Curso</div>
</div>

<div class="card">
  <img src="foto2.jpg">
  <div class="nome">Nome do aluno</div>
  <div class="info">Função no grupo</div>
  <div class="info">Curso</div>
</div>

<div class="card">
  <img src="foto3.jpg">
  <div class="nome">Nome do aluno</div>
  <div class="info">Função no grupo</div>
  <div class="info">Curso</div>
</div>

</div>

</div>

<a href="index.html">
<button>Voltar para a página inicial</button>
</a>

</div>
</div>

</div>

<div class="footer">
<div class="contato">

<a href="https://www.instagram.com/gemicro_ufsj/" target="_blank">
<svg viewBox="0 0 24 24"><path d="M7.75 2C4.58 2 2 4.58 2 7.75v8.5C2 19.42 4.58 22 7.75 22h8.5C19.42 22 22 19.42 22 16.25v-8.5C22 4.58 19.42 2 16.25 2h-8.5z"/></svg>
</a>

<a href="mailto:labmicroambiental.ufsj@gmail.com">
<svg viewBox="0 0 24 24"><path d="M2 4h20v16H2z"/></svg>
</a>

</div>
</div>

</div>

<script>
fetch("header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header-container").innerHTML = data;
});
</script>

</body>
</html>
